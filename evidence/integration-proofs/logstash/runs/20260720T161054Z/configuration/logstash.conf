input {
  kafka {
    bootstrap_servers => "${FLOWPLANE_KAFKA_BOOTSTRAP:kafka:9092}"
    topics => ["${FLOWPLANE_RAW_TOPIC}"]
    group_id => "${FLOWPLANE_GROUP_ID}"
    auto_offset_reset => "earliest"
    consumer_threads => 1
    codec => plain
  }
}

filter {
  ruby {
    init => 'require "net/http"; require "uri"'
    code => '
      uri = URI(ENV.fetch("FLOWPLANE_TRANSFORM_URL"))
      request = Net::HTTP::Post.new(uri)
      request["Content-Type"] = "application/json"
      request["X-FlowPlane-Source-Topic"] = ENV.fetch("FLOWPLANE_RAW_TOPIC")
      request["X-FlowPlane-Source-Key"] = "logstash-kafka-streaming"
      request.body = event.get("message")

      response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: uri.scheme == "https") do |http|
        http.request(request)
      end

      event.set("message", response.body)
      event.set("[@metadata][flowplane_status]", response.code.to_i)
    '
  }
}

output {
  if [@metadata][flowplane_status] == 200 {
    kafka {
      bootstrap_servers => "${FLOWPLANE_KAFKA_BOOTSTRAP:kafka:9092}"
      topic_id => "${FLOWPLANE_TRANSFORMED_TOPIC}"
      codec => plain {
        format => "%{message}"
      }
    }
  } else if [@metadata][flowplane_status] == 422 {
    kafka {
      bootstrap_servers => "${FLOWPLANE_KAFKA_BOOTSTRAP:kafka:9092}"
      topic_id => "${FLOWPLANE_DLQ_TOPIC}"
      codec => plain {
        format => "%{message}"
      }
    }
  }
}
