extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  kafka:
    brokers:
      - ${env:FLOWPLANE_KAFKA_BOOTSTRAP}
    group_id: ${env:FLOWPLANE_GROUP_ID}
    initial_offset: earliest
    logs:
      topics:
        - ${env:FLOWPLANE_RAW_TOPIC}
      encoding: raw

exporters:
  kafka:
    brokers:
      - ${env:FLOWPLANE_KAFKA_BOOTSTRAP}
    logs:
      topic: ${env:FLOWPLANE_FORWARD_TOPIC}
      encoding: raw
    producer:
      required_acks: -1
    retry_on_failure:
      enabled: true
      max_elapsed_time: 0s

service:
  extensions:
    - health_check
  telemetry:
    logs:
      level: info
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
                without_type_suffix: true
                without_units: true
  pipelines:
    logs:
      receivers:
        - kafka
      exporters:
        - kafka
