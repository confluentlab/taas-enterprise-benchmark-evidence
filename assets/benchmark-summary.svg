<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">FlowPlane benchmark evidence summary</title><desc id="desc">Summary of soak, core engine, scaling, and live Flink evidence with status labels.</desc><rect width="1200" height="420" rx="24" fill="#07111f"/><style>.h{font:700 27px system-ui;fill:#f8fafc}.n{font:700 27px system-ui;fill:#67e8f9}.t{font:600 16px system-ui;fill:#e2e8f0}.s{font:14px system-ui;fill:#94a3b8}.b{fill:#101d30;stroke:#334155;stroke-width:2}.warn{fill:#fbbf24}</style><text x="48" y="55" class="h">Latest preserved evidence</text>
  <rect x="48" y="92" width="540" height="120" rx="16" class="b"/><text x="75" y="126" class="t">30-minute Kafka/Flink soak</text><text x="75" y="166" class="n">1,080,001 inputs · final lag 0</text><text x="75" y="193" class="s">1,069,201 output + 10,800 intentional failures</text>
  <rect x="612" y="92" width="540" height="120" rx="16" class="b"/><text x="639" y="126" class="t">1 MiB core engine</text><text x="639" y="166" class="n">0.504 ms mean · p99 1.300 ms</text><text x="639" y="193" class="warn">MEASURED_NOT_QUALIFIED · 9/12 checks met</text>
  <rect x="48" y="236" width="540" height="120" rx="16" class="b"/><text x="75" y="270" class="t">Payload scaling</text><text x="75" y="310" class="n">1-64 MiB · R² 0.9989</text><text x="75" y="337" class="s">Unreferenced grown field; fixed 36,478-byte output</text>
  <rect x="612" y="236" width="540" height="120" rx="16" class="b"/><text x="639" y="270" class="t">Live Flink local proof · 1 MiB</text><text x="639" y="310" class="n">p50 2.512 · p95 11.438 ms</text><text x="639" y="337" class="s">1,001 outputs · zero DLQ</text>
</svg>
