<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">FlowPlane runtime portability status</title><desc id="desc">Native runtime modules, assigned adapters, stateless APIs, and evidence status.</desc>
  <rect width="1200" height="420" rx="24" fill="#07111f"/><style>.h{font:700 27px system-ui;fill:#f8fafc}.t{font:600 16px system-ui;fill:#e2e8f0}.s{font:14px system-ui;fill:#94a3b8}.b{fill:#101d30;stroke:#334155;stroke-width:2}.p{fill:#065f46}.m{fill:#854d0e}.f{fill:#7f1d1d}</style>
  <text x="48" y="55" class="h">Runtime portability: implementation and proof are separate</text>
  <rect x="48" y="92" width="260" height="245" rx="16" class="b"/><text x="75" y="130" class="t">Native modules</text><text x="75" y="168" class="s">Spring / embedded Java</text><text x="75" y="198" class="s">Kafka Connect SMT</text><text x="75" y="228" class="s">Kafka Streams</text><text x="75" y="258" class="s">Apache Flink</text><rect x="75" y="285" width="90" height="28" rx="14" class="p"/><text x="91" y="305" class="s" fill="#fff">local PASS</text>
  <rect x="333" y="92" width="260" height="245" rx="16" class="b"/><text x="360" y="130" class="t">Assigned adapters</text><text x="360" y="168" class="s">Bento</text><text x="360" y="198" class="s">Serverless wrappers</text><text x="360" y="228" class="s">Capability-aware replay</text><rect x="360" y="285" width="110" height="28" rx="14" class="m"/><text x="376" y="305" class="s" fill="#fff">mixed evidence</text>
  <rect x="618" y="92" width="260" height="245" rx="16" class="b"/><text x="645" y="130" class="t">Stateless APIs</text><text x="645" y="168" class="s">HTTP single / batch</text><text x="645" y="198" class="s">gRPC batch / stream</text><text x="645" y="228" class="s">Contract parity fixture</text><rect x="645" y="285" width="150" height="28" rx="14" class="f"/><text x="661" y="305" class="s" fill="#fff">gRPC live FAIL</text>
  <rect x="903" y="92" width="249" height="245" rx="16" class="b"/><text x="930" y="130" class="t">Sidecar paths</text><text x="930" y="168" class="s">NiFi · Spark · Logstash</text><text x="930" y="198" class="s">Redpanda · Vector</text><text x="930" y="228" class="s">Not native wrappers</text><rect x="930" y="285" width="105" height="28" rx="14" class="m"/><text x="946" y="305" class="s" fill="#fff">MEASURED</text>
  <text x="48" y="382" class="s">Local passes and contract tests are not vendor certifications. See docs/runtime-portability.md for the evidence-qualified matrix.</text>
</svg>
