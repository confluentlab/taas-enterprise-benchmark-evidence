version: 1
name: breakpoint-1mb-postgres-300
output: JSON_STRING
error_policy:
  on_transformation_error: ROUTE_TO_DLQ
  on_validation_failure: ROUTE_TO_DLQ
  on_type_mismatch: ROUTE_TO_DLQ
  dlq_topic: dlq.flowplane.1mb.postgres
  include_original_payload: false
  include_error_metadata: true
error_output:
  action: ROUTE_TO_DLQ
  format: ENVELOPE
  dlq_topic: dlq.flowplane.1mb.postgres
  headers: [x-trace-id, x-runtime-id]
  max_payload_bytes: 4096
  include_runtime_metadata: true
lookups:
  statusCode: { OK: observe, WARN: investigate, FAIL: dispatch, NEW: created, PAID: paid, SHIPPED: shipped, CANCELLED: cancelled }
  riskAction: { LOW: monitor, MEDIUM: review, HIGH: escalate }
  nestedLookup:
    WARN: { action: investigate, severity: medium }
fields:
  event_id_required: { path: $.event.id, required: true, validate: { required: true, pattern: '^evt-' } }
  event_type_upper: { path: $.event.type, case_convert: upper }
  event_type_lower: { path: $.event.type, case_convert: lower }
  event_timestamp_millis: { path: $.event.ts, cast: timestamp }
  custom_date: { path: $.event.dateText, cast: date, date_format: 'MM/dd/yyyy' }
  custom_time: { path: $.event.timeText, cast: time, date_format: 'HH:mm:ss' }
  custom_timestamp_millis: { path: $.event.timestampText, cast: timestamp, date_format: 'MM/dd/yyyy HH:mm:ss' }
  tenant_id_direct: { direct: $.tenant.id }
  environment_source: { source: $.tenant.env, case_convert: upper }
  missing_region_fallback: { path: $.tenant.missingRegion, fallback: [$.tenant.region], default: NA }
  constant_runtime: { constant: live-stack }
  literal_value: { value: demo-value }
  generated_uuid: { generate: uuid }
  generated_now: { generate: now }
  concat_label: { valueExpr: { function: { name: concat, args: [ { path: $.device.type }, { const: '-' }, { path: $.device.id } ] } } }
  template_function: { valueExpr: { fn: { name: template, args: [ { const: 'site=' }, { path: $.site.name }, { const: '|device=' }, { path: $.device.id } ] } } }
  coalesce_contact: { valueExpr: { coalesce: { mode: FIRST_NON_EMPTY, candidates: [ { type: PATH, path: $.site.contact }, { type: PATH, path: $.site.backupContact }, { type: CONST, value: unknown@local } ] } } }
  case_route: { valueExpr: { case: { branches: [ { when: { path: $.metrics.risk, operator: eq, value: HIGH }, then: { const: page-oncall } }, { when: { path: $.metrics.load, operator: gte, value: 90 }, then: { const: scale-up } } ], else: { const: observe } } } }
  status_lookup_inline: { path: $.device.status, lookup: { dictionary: statusCode } }
  risk_lookup_expr_default: { valueExpr: { lookup: { dictionary: riskAction, path: $.metrics.risk, onMiss: DEFAULT, defaultValue: observe, caseInsensitive: true, trimInput: true } } }
  nested_lookup_field: { valueExpr: { lookup: { dictionary: nestedLookup, path: $.device.status, resultField: severity, onMiss: DEFAULT, defaultValue: unknown } } }
  serial_family: { path: $.device.serial, regex_extract: '^(GW)-.*' }
  firmware_number: { path: $.device.firmware, regex_replace: '^fw-', replacement: '' }
  status_matches: { path: $.device.status, regex_match: '^(OK|WARN|FAIL)$' }
  normalized_message: { path: $.packet.message, normalize_string: true }
  templated_status: { path: $.device.status, template: 'status-${value}' }
  serial_prefix: { path: $.device.serial, substring: { start: 0, end: 2 } }
  label_parts: { path: $.packet.labels, split: { by: '|' } }
  temp_f: { expression: '$.metrics.tempC * 1.8 + 32', round: { scale: 2 } }
  is_hot: { expression: '$.metrics.tempC >= 20' }
  load_plus_ten: { arithmetic: '$.metrics.load + 10' }
  load_int: { path: $.metrics.load, cast: int }
  metric_long: { path: '$.data.records[200].longValue', cast: long }
  temp_double: { path: $.metrics.tempC, cast: double }
  voltage_decimal_round: { path: $.metrics.voltage, cast: decimal, decimalScale: 2, decimalScalePolicy: ROUND }
  voltage_decimal_truncate: { path: $.metrics.voltage, cast: decimal, decimalScale: 2, decimalScalePolicy: TRUNCATE }
  online_boolean: { path: $.metrics.online, cast: boolean }
  raw_packet_json: { path: $.packet.raw, cast: json }
  raw_packet_object: { path: $.packet.raw, cast: object }
  strict_tenant_id_for_negative_smoke: { path: $.tenant.id, onMissing: ERROR }
  signal_values_array: { path: '$.signals[*].value', array_mode: COLLECT, cast: array }
  first_signal_name: { path: '$.signals[*].name', array_mode: FIRST }
  last_signal_name: { path: '$.signals[*].name', array_mode: LAST }
  second_signal_name: { path: '$.signals[*].name', array_mode: INDEX, array_index: 1 }
  only_signal_name: { path: '$.singleSignal[*].name', array_mode: ONLY }
  high_signal_first: { path: '$.signals[?(@.value >= 80)].name', array_mode: FILTER_FIRST }
  high_signal_names: { path: '$.signals[?(@.value >= 80)].name', array_mode: FILTER_ALL }
  signal_count: { path: '$.signals[*]', array_mode: COUNT }
  signal_name_join: { path: '$.signals[*].name', array_mode: JOIN, delimiter: '|' }
  expensive_signal_objects: { path: '$.signals[*]', filter: 'item.value >= 80', map: { metric: item.name, reading: item.value } }
  flattened_literal: { value: [ [edge, critical], [night, critical] ], flatten: true }
  unique_tags: { path: '$.tags[*]', distinct: true }
  signal_value_sum: { path: '$.signals[*].value', aggregate: sum }
  signal_value_min: { path: '$.signals[*].value', aggregate: min }
  signal_value_max: { path: '$.signals[*].value', aggregate: max }
  signal_value_aggregate_count: { path: '$.signals[*].value', aggregate: count }
  device_summary: { object: { id: $.device.id, status: $.device.status, 'site.name': $.site.name } }
  profile_merged: { merge: [$.profile.base, $.profile.prefs] }
  nested_device_id: { path: $.device.id }
  object_as_json: { path: $.device, onObject: JSON_STRING }
  array_as_json: { path: $.tags, onArray: JSON_STRING }
  missing_as_null: { path: $.does.not.exist, onMissing: NULL }
  missing_skipped: { path: $.does.not.exist, onMissing: SKIP_FIELD }
  missing_defaulted: { path: $.does.not.exist, default: missing-default }
  nullable_default: { path: $.nullable, onNull: DEFAULT, default: fallback-null }
  nullable_default_secondary: { path: $.nullable, onNull: DEFAULT, default: fallback-null-secondary }
  bad_int_default: { path: $.metrics.badInt, cast: int, onTypeMismatch: DEFAULT, default: -1 }
  bad_int_stringified: { path: $.metrics.badInt, cast: int, onTypeMismatch: STRINGIFY }
  huge_int_clamped: { path: $.metrics.huge, cast: int, onOverflow: CLAMP }
  huge_int_default: { path: $.metrics.huge, cast: int, onOverflow: DEFAULT, default: 2147483647 }
  amount_decimal_from_string: { path: $.metrics.amountText, cast: decimal, decimalScale: 2, decimalScalePolicy: ROUND }
  status_allowed_set: { path: $.device.status, validate: { one_of: [OK, WARN, FAIL] } }
  status_pattern_valid: { path: $.device.status, validate: '^(OK|WARN|FAIL)$' }
  token_masked: { path: $.device.token, mask: last4 }
  sensitive_token: { path: $.device.token, sensitive: true }
  trace_hash: { path: $.event.trace, hash: sha256 }
  secret_redacted: { path: $.device.secret, redact: true }
  secret_encrypted: { path: $.device.secret, encrypt: { key_ref: demo } }
  secret_decrypt_defaulted: { path: $.device.secret, decrypt: { key_ref: demo }, onTypeMismatch: DEFAULT, default: decrypt-failed }
  metadata_request_id: { metadata: requestId, default: no-metadata }
  header_trace_id: { header: x-trace-id, default: no-header }
