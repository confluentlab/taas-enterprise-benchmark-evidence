version: 1
name: breakpoint-1mb-mongo-2000
output: FLAT_OBJECT
error_policy:
  on_transformation_error: ROUTE_TO_DLQ
  on_validation_failure: ROUTE_TO_DLQ
  on_type_mismatch: ROUTE_TO_DLQ
  dlq_topic: dlq.flowplane.1mb.mongo
  include_original_payload: false
  include_error_metadata: true
error_output:
  action: ROUTE_TO_DLQ
  format: ENVELOPE
  dlq_topic: dlq.flowplane.1mb.mongo
  headers: [x-trace-id, x-runtime-id]
  max_payload_bytes: 4096
  include_runtime_metadata: true
lookups:
  statusCode: { OK: observe, WARN: investigate, FAIL: dispatch, NEW: created, PAID: paid, SHIPPED: shipped, CANCELLED: cancelled }
  riskAction: { LOW: monitor, MEDIUM: review, HIGH: escalate }
  nestedLookup:
    WARN: { action: investigate, severity: medium }
fields:
  event_id_required: { path: $.event.id, required: true, validate: { required: true, pattern: '^evt-' } }
  event_type_upper: { path: $.event.type, case_convert: upper }
  event_type_lower: { path: $.event.type, case_convert: lower }
  event_timestamp_millis: { path: $.event.ts, cast: timestamp }
  custom_date: { path: $.event.dateText, cast: date, date_format: 'MM/dd/yyyy' }
  custom_time: { path: $.event.timeText, cast: time, date_format: 'HH:mm:ss' }
  custom_timestamp_millis: { path: $.event.timestampText, cast: timestamp, date_format: 'MM/dd/yyyy HH:mm:ss' }
  tenant_id_direct: { direct: $.tenant.id }
  environment_source: { source: $.tenant.env, case_convert: upper }
  missing_region_fallback: { path: $.tenant.missingRegion, fallback: [$.tenant.region], default: NA }
  constant_runtime: { constant: live-stack }
  literal_value: { value: demo-value }
  generated_uuid: { generate: uuid }
  generated_now: { generate: now }
  concat_label: { valueExpr: { function: { name: concat, args: [ { path: $.device.type }, { const: '-' }, { path: $.device.id } ] } } }
  template_function: { valueExpr: { fn: { name: template, args: [ { const: 'site=' }, { path: $.site.name }, { const: '|device=' }, { path: $.device.id } ] } } }
  coalesce_contact: { valueExpr: { coalesce: { mode: FIRST_NON_EMPTY, candidates: [ { type: PATH, path: $.site.contact }, { type: PATH, path: $.site.backupContact }, { type: CONST, value: unknown@local } ] } } }
  case_route: { valueExpr: { case: { branches: [ { when: { path: $.metrics.risk, operator: eq, value: HIGH }, then: { const: page-oncall } }, { when: { path: $.metrics.load, operator: gte, value: 90 }, then: { const: scale-up } } ], else: { const: observe } } } }
  status_lookup_inline: { path: $.device.status, lookup: { dictionary: statusCode } }
  risk_lookup_expr_default: { valueExpr: { lookup: { dictionary: riskAction, path: $.metrics.risk, onMiss: DEFAULT, defaultValue: observe, caseInsensitive: true, trimInput: true } } }
  nested_lookup_field: { valueExpr: { lookup: { dictionary: nestedLookup, path: $.device.status, resultField: severity, onMiss: DEFAULT, defaultValue: unknown } } }
  serial_family: { path: $.device.serial, regex_extract: '^(GW)-.*' }
  firmware_number: { path: $.device.firmware, regex_replace: '^fw-', replacement: '' }
  status_matches: { path: $.device.status, regex_match: '^(OK|WARN|FAIL)$' }
  normalized_message: { path: $.packet.message, normalize_string: true }
  templated_status: { path: $.device.status, template: 'status-${value}' }
  serial_prefix: { path: $.device.serial, substring: { start: 0, end: 2 } }
  label_parts: { path: $.packet.labels, split: { by: '|' } }
  temp_f: { expression: '$.metrics.tempC * 1.8 + 32', round: { scale: 2 } }
  is_hot: { expression: '$.metrics.tempC >= 20' }
  load_plus_ten: { arithmetic: '$.metrics.load + 10' }
  load_int: { path: $.metrics.load, cast: int }
  metric_long: { path: '$.data.records[0].longValue', cast: long }
  temp_double: { path: $.metrics.tempC, cast: double }
